name: Run Unittest

on:
  push:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

jobs:
  run_unittest:
    runs-on: ubuntu-20.04
    steps:  
    - name: Maximize build space
      run:  |
            sudo rm -rf /usr/local/lib/android # will release about 10 GB if you don't need Android
            sudo rm -rf /usr/share/dotnet # will release about 20GB if you don't need .NET
            sudo rm -rf /opt/ghc
            echo "Available storage:"
            df -h
            docker system prune -a --volumes -f # delete unnecessary preinstalled docker images
            
    - uses: actions/checkout@v4
    
    - uses: docker/setup-qemu-action@v3

    - name: Install vcs
      run: pip3 install vcstool

    - name: Prepare thirdparty repos
      run: ./setup-dependency.sh

    - name: Pull images and build workspace
      shell: bash
      run:  |
             docker pull cmucal/cabot-navigation:latest
             docker tag cmucal/cabot-navigation:latest cabot-navigation-ros2
             for tag in bag gazebo gui navigation diagnostic; do
               docker tag cabot-navigation-ros2:latest cabot-navigation-$tag:latest
             done
             
             docker pull cmucal/cabot-localization:latest
             docker tag cmucal/cabot-localization:latest cabot-navigation-localization
             for tag in mapping post-process rtk-gnss; do
               docker tag cabot-navigation-localization:latest cabot-navigation-$tag:latest
             done
             
             HOST_UID=$(id -u)
             for img in ros2 bag gazebo gui navigation diagnostic localization mapping post-process rtk-gnss; do
               docker build -t cabot-navigation-$img:latest - <<EOF
               FROM cabot-navigation-$img:latest
               USER root
               RUN usermod -u $(id -u) developer
               USER developer 
               EOF
             done
    - name: Run unittest
      shell: bash
      run: ./launch.sh -p -u -- -b -a
